<div class="rxjs-demo">
    <h3>RxJS Demo</h3>

    <div class="buttons">
        <button class="btn" (click)="demo1()">1. of() + subscribe()</button>
        <button class="btn" (click)="demo2()">2. pipe() + map() + filter()</button>
        <button class="btn" (click)="demo3()">3. tap()</button>

        <button class="btn" (click)="clearResults()">Clear</button>
    </div>

    <div class="results">
        @if (results.length === 0) {
        <p class="empty">Click one of the btns to see detajls!</p>
        }
        @for (r of results; track $index) {
        <div class="results">{{ r }}</div>
        }
    </div>
</div>
